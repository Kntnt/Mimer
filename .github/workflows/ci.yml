name: CI

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Sync dependencies
        run: uv sync

      - name: Cache the embedding model
        uses: actions/cache@v4
        with:
          path: ~/.cache/huggingface
          key: huggingface-potion-base-8M

      - name: Lint (ruff)
        run: uv run ruff check .

      - name: Format check (ruff)
        run: uv run ruff format --check .

      - name: Type check (mypy)
        run: uv run mypy

      - name: Tests (pytest)
        run: uv run pytest -q

  # Build the wheel, install it into a fresh environment, and run the packaged
  # `mimer-*` console scripts and a hook — the seam the in-process Stage 8 gate
  # cannot reach. Needs no `claude` binary. Kept separate so its build/install
  # cost never gates the fast unit run.
  packaging:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Sync dependencies
        run: uv sync

      - name: Packaging smoke test
        run: uv run pytest tests/test_packaging.py -q
        env:
          MIMER_PACKAGING: "1"

name: CI

on:
  push:
  pull_request:

# uv-managed CPython (python-build-standalone) is built with loadable SQLite
# extensions enabled, which sqlite-vec requires. Some runners' preinstalled
# interpreter — notably macOS — is not, which fails every index-backed test with
# "sqlite3.Connection has no attribute enable_load_extension". Force uv to use
# its own managed interpreter on every platform so the extension check passes.
env:
  UV_PYTHON_PREFERENCE: only-managed

jobs:
  test:
    runs-on: ${{ matrix.os }}
    strategy:
      # macOS is a first-class target, so a macOS-only regression in locking,
      # permissions, process spawning or the SQLite-extension check must fail
      # here rather than on a user's machine. fail-fast is off so a failure on
      # one platform still lets the other report.
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]

    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Sync dependencies
        run: uv sync

      - name: Cache the embedding model
        uses: actions/cache@v4
        with:
          path: ~/.cache/huggingface
          key: huggingface-potion-base-8M-${{ runner.os }}

      - name: Lint (ruff)
        run: uv run ruff check .

      - name: Format check (ruff)
        run: uv run ruff format --check .

      - name: Type check (mypy)
        run: uv run mypy

      # Populate the model cache deterministically before the suite runs, so a
      # cache miss fails loudly at this named step instead of lazily inside
      # whichever test first embeds. The tests then run with HF_HUB_OFFLINE on.
      - name: Prefetch the embedding model
        run: uv run python -c "from mimer.install import prefetch_embedding_model; prefetch_embedding_model()"

      - name: Tests (pytest, with coverage)
        run: uv run pytest -q --cov --cov-report=term-missing --cov-report=xml

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-${{ matrix.os }}
          path: coverage.xml
          if-no-files-found: ignore

  # Build the wheel, install it into a fresh environment, and run the packaged
  # `mimer-*` console scripts and a hook — the seam the in-process Stage 8 gate
  # cannot reach. Needs no `claude` binary. Kept separate so its build/install
  # cost never gates the fast unit run.
  packaging:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Sync dependencies
        run: uv sync

      - name: Packaging smoke test
        run: uv run pytest tests/test_packaging.py -q
        env:
          MIMER_PACKAGING: "1"
